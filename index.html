<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Treats Bakery</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        header {
            background-color: #ff7f50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        nav a:hover {
            color: #ff7f50;
        }
        .hero {
            background: url('https://images.unsplash.com/photo-1542826438-bd32f43d626f') no-repeat center center/cover;
            height: 300px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
        }
        .container {
            padding: 20px;
            text-align: center;
        }
        .products {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        .card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            margin: 10px;
            width: 250px;
        }
        .card img {
            width: 100%;
            border-radius: 10px;
        }
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Sweet Treats Bakery</h1>
    <p>Fresh & Delicious Every Day</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Menu</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<div class="hero">
    Welcome to Our Bakery
</div>

<div class="container">
    <h2>Our Special Items</h2>
    <div class="products">
        
        <div class="card">
            <img src="https://images.unsplash.com/photo-1608198093002-ad4e005484ec" alt="Cake">
            <h3>Chocolate Cake</h3>
            <p>Rich and creamy chocolate delight.</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff" alt="Bread">
            <h3>Fresh Bread</h3>
            <p>Baked fresh every morning.</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b" alt="Cupcake">
            <h3>Cupcakes</h3>
            <p>Colorful and tasty cupcakes.</p>
        </div>

    </div>
</div>

<footer>
    <p>© 2026 Sweet Treats Bakery | All Rights Reserved</p>
</footer>

</body>
</html>
